<!DOCTYPE html>
<html>
<head>

<title>Settings</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="content">

<div class="card">

<h2>Panel Settings</h2>

<label>Panel Name</label>

<input
type="text"
id="panelName"
placeholder="LHOP01">

  
<br><br>

<label>Announcement</label>

<input
type="text"
id="announcement"
placeholder="Welcome To LHOP01">

<br><br>

<label>Owner Name</label>

<input
type="text"
id="ownerName"
placeholder="LHOP01 Owner">

<br><br>

<label>Logo URL</label>

<input
type="text"
id="logoUrl"
placeholder="https://example.com/logo.png">

<br><br>

<label>Theme Color</label>

<input
type="color"
id="themeColor"
value="#238636">

<br><br>

<label>Panel Version</label>

<input
type="text"
id="panelVersion"
placeholder="v5.0">  
  
<label>
<input type="checkbox" id="maintenance">
Maintenance Mode
</label>
  
<br><br>

<button onclick="saveSettings()">
Save Settings
</button>

<button onclick="window.location.href='index.html'">
⬅ Back to Dashboard
</button>
<p>LHOP01 PAID PANEL </p>  
</div>

</div>

<script type="module" src="settings.js"></script>

</body>
</html>
