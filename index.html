<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LHOP01 Paid Panel</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="sidebar">
    <h2>LHOP01</h2>

    <a href="#">📋 Dashboard</a>
    <a href="#">🔑 Generate Key</a>
    <a href="#">📝 Manage Keys</a>
    <a href="#">⚙️ Settings</a>

    <button id="themeToggle">🌙 Dark / Light</button>
</div>

<div class="content">

<h1>LHOP01 PAID PANEL</h1>

<div class="stats">

<div class="box">
<h2 id="totalKeys">0</h2>
<p>Total Keys</p>
</div>

<div class="box">
<h2 id="activeKeys">0</h2>
<p>Active Keys</p>
</div>

<div class="box">
<h2 id="expiredKeys">0</h2>
<p>Expired Keys</p>
</div>

<div class="box">
<h2 id="todayKeys">0</h2>
<p>Today's Keys</p>
</div>

</div>

<div class="card">

<h2>Generate Key</h2>

<input id="buyerName" type="text" placeholder="Buyer Name">

<select id="days">
<option value="1">1 Day</option>
<option value="7">7 Days</option>
<option value="30">30 Days</option>
<option value="365">1 Year</option>
<option value="9999">Lifetime</option>
</select>

<button onclick="generateKey()">Generate Key</button>

<div id="result"></div>

</div>

<div class="card">

<h2>Generated Keys</h2>

<table id="keyTable">

<tr>
<th>Buyer</th>
<th>Key</th>
<th>Days</th>
<th>Status</th>
<th>Action</th>
</tr>

</table>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
