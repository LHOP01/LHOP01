<!DOCTYPE html>
<html>
<head>
<title>LHOP01 ADMIN PANEL</title>

<link rel="stylesheet" href="style.css">
  
<style>

body{
margin:0;
background:#0d1117;
font-family:Arial;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#161b22;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#58a6ff;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin-top:10px;
background:#21262d;
border-radius:8px;
}

.content{
margin-left:250px;
padding:20px;
}

.card{
background:#161b22;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.stats{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:20px;
}

.box{
background:#21262d;
padding:20px;
border-radius:10px;
width:180px;
text-align:center;
}

.box h2{
margin:0;
color:#58a6ff;
}

.box p{
margin-top:10px;
}  

input, select, button{
width:100%;
padding:12px;
margin-top:10px;
background:#21262d;
color:white;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
background:#238636;
cursor:pointer;
}  
  
</style>

</head>

<body>

<div class="sidebar">

<h2>LHOP01</h2>

<a href="#">Dashboard</a>

<a href="#">Generate Key</a>

<a href="#">Custom Key</a>

<a href="#">Manage Keys</a>

<a href="#">Settings</a>

</div>

<div class="content">

<h1>Admin Dashboard</h1>

<div class="card">

<div class="stats">

<div class="box">
<h2 id="totalKeys">0</h2>
<p>Total Keys</p>
</div>

<div class="box">
<h2 id="activeKeys">0</h2>
<p>Active Keys</p>
</div>

<div class="box">
<h2 id="expiredKeys">0</h2>
<p>Expired Keys</p>
</div>

<div class="box">
<h2 id="lifetimeKeys">0</h2>
<p>Lifetime Keys</p>
</div>



</div>

  
<h2>Welcome Owner</h2>

<p>Panel Successfully Working...</p>

</div>

<div class="card">

<h2>Generated Keys</h2>

<input
id="searchKey"
type="text"
placeholder="Search Key..."
onkeyup="loadKeys()">

<br><br>  

<table id="keyTable" width="100%">

<tr>
<th>Key</th>
<th>Buyer</th>
<th>Validity</th>
<th>Status</th>
<th>Action</th>
</tr>

</table>

</div>

<div class="card">

<h2>Custom Key</h2>

<input type="text" id="customKey" placeholder="Enter Custom Key">

<br><br>

<input type="number" id="customDays" placeholder="Validity Days">

<br><br>

<button onclick="createCustomKey()">
Generate Custom Key
</button>

</div>
  
<div class="card">

<h2>Generate Key</h2>

<input
type="text"
id="buyerName"
placeholder="Enter Buyer Name">

<br><br>


  
<select id="days">  
<option value="1">1 Day</option>
<option value="3">3 Days</option>  
<option value="7">7 Days</option>
<option value="15">15 Days</option>  
<option value="30">30 Days</option>
<option value="365">1 Year</option>
<option value="9999">Lifetime</option>
</select>

<br>

<button onclick="generateKey()">Generate Random Key</button>

<br><br>


</div>  
  
</div>

</body>
</html>
